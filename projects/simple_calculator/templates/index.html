<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; }
        .calculator { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 350px; margin: 0 auto; }
        input, select, button { padding: 10px; margin: 8px; font-size: 18px; width: 80%; }
        button { background: #007bff; color: white; border: none; cursor: pointer; border-radius: 8px; }
        button:hover { background: #0056b3; }
        .result { font-size: 24px; margin-top: 20px; color: #28a745; font-weight: bold; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Calculator</h1>
        
        <form method="POST">
            <input type="number" name="num1" step="any" placeholder="First number" required><br>
            <input type="number" name="num2" step="any" placeholder="Second number" required><br>
            
            <select name="operation" required>
                <option value="">Select operation</option>
                <option value="+">➕ Addition</option>
                <option value="-">➖ Subtraction</option>
                <option value="*">✖ Multiplication</option>
                <option value="/">➗ Division</option>
            </select><br>
            
            <button type="submit">Calculate</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        
        {% if result is not none %}
            <div class="result">
                Result = {{ result }}
            </div>
        {% endif %}
    </div>
</body>
</html>
